<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="margin:0;padding:0;background:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
    <div style="max-width:640px;margin:0 auto;padding:20px;">
        <!-- Header -->
        <div style="background:linear-gradient(135deg,#ee4c2c,#ff6f3c);padding:30px;border-radius:12px 12px 0 0;text-align:center;">
            <h1 style="color:white;margin:0;font-size:22px;">🔥 PyTorch KR 뉴스 브리핑</h1>
            <p style="color:rgba(255,255,255,0.9);margin:8px 0 0 0;font-size:14px;">{{date_range}}</p>
        </div>

        <!-- Content -->
        <div style="background:white;padding:30px;border-radius:0 0 12px 12px;">
            <!-- 트렌드 종합 -->
            <div style="margin-bottom:30px;">
                <h2 style="color:#333;font-size:18px;margin:0 0 12px 0;">🔍 오늘의 트렌드</h2>
                <div style="padding:15px;background:#fff8e1;border-radius:8px;border-left:4px solid #ffc107;">
                    <p style="margin:0;color:#333;line-height:1.7;">{{trend_summary}}</p>
                </div>
            </div>

            <!-- 개별 글 요약 -->
            <div style="margin-bottom:30px;">
                <h2 style="color:#333;font-size:18px;margin:0 0 12px 0;">📋 개별 글 요약</h2>
                {{articles}}
            </div>

            <!-- 통계 -->
            <div style="padding:15px;background:#e8f5e9;border-radius:8px;text-align:center;">
                <p style="margin:0;color:#2e7d32;font-size:14px;">
                    📊 총 <strong>{{article_count}}</strong>개 글 수집 ({{date_range}})
                </p>
            </div>
        </div>

        <!-- Footer -->
        <div style="text-align:center;padding:16px;color:#999;font-size:12px;">
            이 브리핑은 AI(Gemini)가 자동 생성했습니다.
        </div>
    </div>
</body>
</html>
